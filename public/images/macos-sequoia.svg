<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d5a27"/>
    </linearGradient>
    <linearGradient id="tree" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Sequoia tree silhouette -->
  <polygon points="600,120 480,350 540,350 510,480 690,480 660,350 720,350" fill="url(#tree)" opacity="0.8"/>
  <rect x="580" y="480" width="40" height="60" fill="#92400e"/>
  <text x="600" y="575" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="38" font-weight="700" fill="white" text-anchor="middle">macOS Sequoia</text>
</svg>
