<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
    <linearGradient id="visor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3a;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#2a1a4a;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1a2a3a;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="600" cy="315" rx="200" ry="100" fill="url(#glow)" opacity="0.15" filter="url(#blur)"/>
  <ellipse cx="600" cy="290" rx="280" ry="120" rx="280" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  <ellipse cx="600" cy="290" rx="260" ry="108" fill="url(#visor)" stroke="#4c1d95" stroke-width="1.5"/>
  <ellipse cx="510" cy="290" rx="90" ry="78" fill="#0d0d2a" stroke="#6d28d9" stroke-width="1" opacity="0.9"/>
  <ellipse cx="690" cy="290" rx="90" ry="78" fill="#0d0d2a" stroke="#6d28d9" stroke-width="1" opacity="0.9"/>
  <ellipse cx="510" cy="290" rx="60" ry="52" fill="#1e1b4b" opacity="0.6"/>
  <ellipse cx="690" cy="290" rx="60" ry="52" fill="#1e1b4b" opacity="0.6"/>
  <text x="600" y="460" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle">Apple Vision Pro</text>
  <text x="600" y="500" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="20" fill="#a78bfa" text-anchor="middle">空間コンピューティングの時代へ</text>
</svg>
